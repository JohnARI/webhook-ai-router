name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: webhook_ai_router
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: dev
      LOG_LEVEL: WARNING
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/webhook_ai_router
      REDIS_URL: redis://localhost:6379/0
      HUBSPOT_WEBHOOK_SECRET: ci-test-secret
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/webhook_ai_router
      # The factory-level missing-key guard runs only at worker boot, never
      # in tests — so we don't need a Gemini key in CI. Fixing the default
      # provider here is just belt-and-braces.
      LLM_PROVIDER: anthropic

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Pin Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check src tests

      - name: ruff format check
        run: uv run ruff format --check src tests

      - name: mypy --strict
        run: uv run mypy src

      - name: alembic upgrade head
        run: uv run alembic upgrade head

      - name: pytest (coverage gate 80%)
        run: >-
          uv run pytest
          --cov=webhook_ai_router
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=80

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  docker-build:
    name: Docker image smoke build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: webhook-ai-router:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
